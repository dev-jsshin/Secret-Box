spring:
  application:
    name: secretbox-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # mail 설정은 spring-boot-starter-mail 활성화 시 다시 추가 (2FA 이메일 구현 단계)

server:
  port: 6333
  error:
    include-message: never
    include-stacktrace: never

app:
  jwt:
    secret: ${JWT_SECRET}
    access-ttl-minutes: 15
    refresh-ttl-days: 30
  # mail.from은 메일 기능 추가 시 활성화
  security:
    kdf:
      min-iterations: 3
      min-memory-kb: 65536
      min-parallelism: 4

logging:
  level:
    root: INFO
    com.secretbox: DEBUG
    org.springframework.security: INFO
