# SecretBox — 단일 호스트 자가 호스팅 구성
#
# 최초 기동:
#   cp .env.example .env
#   # .env 열어서 JWT_SECRET과 POSTGRES_PASSWORD를 실제 값으로 교체
#   docker compose up -d --build
#   → https://<호스트-IP>:7444  (self-signed 경고 수락)
#
# 개발 중 코드 수정 후 반영:
#   docker compose up -d --build
#
# 완전 초기화 (DB 포함):
#   docker compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: secretbox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # 외부 노출 X — backend 컨테이너만 내부 네트워크로 접근. dev에서 DB 직접 보고 싶으면
    # ports를 열 수 있음 (주석 해제)
    # ports:
    #   - "${POSTGRES_PORT:-5432}:5432"

  backend:
    build:
      context: ./backend
    container_name: secretbox-backend
    restart: unless-stopped
    environment:
      SERVER_PORT:              6333
      SPRING_DATASOURCE_URL:    jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET:               ${JWT_SECRET}
      JWT_ACCESS_TTL_MINUTES:   ${JWT_ACCESS_TTL_MINUTES:-2}
      JWT_REFRESH_TTL_DAYS:     ${JWT_REFRESH_TTL_DAYS:-30}
      # LAN에서 여러 PC 접속 → 와일드카드 허용. 실 도메인 쓸 땐 실제 Origin만 나열
      APP_CORS_ALLOWED_ORIGIN_PATTERNS: ${APP_CORS_ALLOWED_ORIGIN_PATTERNS:-https://*}
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: secretbox-frontend
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-7444}:443"
    volumes:
      - certs:/etc/nginx/certs
    depends_on:
      - backend

volumes:
  postgres-data:
  certs:
