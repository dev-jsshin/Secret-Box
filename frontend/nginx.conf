# SecretBox frontend — static SPA + /api 역방향 프록시 + HTTPS
#
# 보안 참고:
#   - self-signed 인증서 (entrypoint가 최초 기동 시 생성). 브라우저 경고 발생하지만
#     LAN/자가 호스팅에선 관용적 — 실 도메인 쓸 땐 Caddy/Let's Encrypt 도입 권장
#   - /api 로 들어오는 요청은 내부 네트워크의 backend:6333 으로만 전달

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 브라우저 XSS/MIME sniffing 방지 헤더 최소 셋
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY" always;
    add_header Referrer-Policy        "no-referrer" always;

    root /usr/share/nginx/html;
    index index.html;

    # 정적 자산 캐시
    location ~* \.(?:js|css|svg|woff2?|png|jpg|ico)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # API 프록시
    location /api/ {
        proxy_pass http://backend:6333/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }

    # SPA fallback — 모든 경로를 index.html로
    location / {
        try_files $uri $uri/ /index.html;
    }
}
